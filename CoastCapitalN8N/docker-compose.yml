version: "3.9"

services:
  n8n:
    image: n8nio/n8n:1.76.1
    container_name: coastcapital-n8n
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${N8N_HOST:-localhost}:5678/
      GENERIC_TIMEZONE: ${TIMEZONE:-America/New_York}
      # MySQL backend for N8N internal storage
      DB_TYPE: mysqldb
      DB_MYSQLDB_HOST: coastcapital-mysql
      DB_MYSQLDB_PORT: 3306
      DB_MYSQLDB_DATABASE: n8n_db
      DB_MYSQLDB_USER: ${MYSQL_USER:-dbadmin}
      DB_MYSQLDB_PASSWORD: ${MYSQL_PASSWORD}
      # Slack (for workflow triggers)
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      # Ollama (for Slack dispatcher LLM intent classification)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      # Platform API (for MCP dispatcher + Architecture Agent)
      PLATFORM_API_KEY: ${PLATFORM_API_KEY}
      # Anthropic API (for error handler auto-MR)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Git credentials (for auto-MR)
      GIT_USER_NAME: ${GIT_USER_NAME:-CoastCapital Bot}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-bot@coastcapital.local}
      # Docker socket (for rebuild workflow)
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../:/workspace:rw
      - ./workflows:/n8n-workflows:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - db-external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data:
    driver: local

networks:
  db-external:
    external: true
    name: coastcapitaldatabase_db-network

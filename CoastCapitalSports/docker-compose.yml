version: "3.9"

services:
  coastsports:
    build: .
    container_name: coastcapital-sports
    env_file:
      - ../.env
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-coastcapital-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-dbadmin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MODEL_DIR: ${MODEL_DIR:-/app/model_artifacts}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com}
      # Timezone
      TZ: ${TIMEZONE:-America/New_York}
    volumes:
      - ./app:/app
      - ../CoastCapitalBrand:/app/static/brand:ro
      - ./logs:/app/logs
    ports:
      - "5300:5000"
    networks:
      - sports-net
      - db-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  sports-net:
    driver: bridge
  db-external:
    external: true
    name: coastcapitaldatabase_db-network

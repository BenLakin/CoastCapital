version: "3.9"

services:
  flask_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coast_capital_finance
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      API_KEY: ${API_KEY}
      MYSQL_HOST: coastcapital-mysql
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-dbadmin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${FINANCE_MYSQL_DATABASE:-finance_silver}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # LLM routing
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_PROVIDER_PRIMARY: ${LLM_PROVIDER_PRIMARY:-gemini}
      LLM_PROVIDER_SECONDARY: ${LLM_PROVIDER_SECONDARY:-ollama}
      LLM_MAX_ARTICLES_PER_STOCK: ${LLM_MAX_ARTICLES_PER_STOCK:-3}
      # Timezone
      TZ: ${TIMEZONE:-America/New_York}
    volumes:
      - ./app:/app/app
      - ./wsgi.py:/app/wsgi.py
      - ./logs:/app/logs
      - ./models_cache:/app/models_cache
      - ../CoastCapitalBrand:/app/app/static/brand:ro
    networks:
      - finance-net
      - db-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  finance-net:
    driver: bridge
  db-external:
    external: true
    name: coastcapitaldatabase_db-network

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CoastCapital Assistant{% endblock %}</title>
  <link rel="icon" href="/static/brand/img/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/brand/css/brand.css">
  <link rel="stylesheet" href="/static/brand/css/nav.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { @apply bg-white rounded-2xl shadow-sm border border-gray-100 p-5; }
    .badge-family { @apply inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-rose-100 text-rose-700; }
    .badge-ai     { @apply inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-700; }
    .badge-tech   { @apply inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700; }
    .badge-world  { @apply inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700; }
    .badge-b2b    { @apply inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700; }
    .priority-1   { @apply border-l-4 border-rose-500; }
    .priority-2   { @apply border-l-4 border-orange-400; }
    .priority-3   { @apply border-l-4 border-yellow-400; }
    .priority-4   { @apply border-l-4 border-blue-400; }
    .priority-5   { @apply border-l-4 border-gray-300; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50" data-cc-module="assistant"
      data-cc-page="{% if request.path == '/communications' %}action-plan{% elif '/relationship' in request.path %}relationships{% else %}dashboard{% endif %}">

  <!-- Main content -->
  <main class="max-w-screen-2xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

<!-- Email Send Modal -->
<div id="emailModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeEmailModal()"></div>
  <div class="absolute inset-x-0 bottom-0 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2
              bg-white rounded-t-2xl md:rounded-2xl shadow-2xl w-full md:w-[600px] p-6 z-10">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold text-gray-900">Send Email</h3>
      <button onclick="closeEmailModal()" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">To</label>
        <input id="emailTo" type="email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
        <input id="emailSubject" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
        <textarea id="emailBody" rows="6"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
      </div>
      <input type="hidden" id="emailActionId"/>
      <div id="emailStatus" class="text-sm hidden"></div>
      <div class="flex gap-3 pt-2">
        <button onclick="submitEmail()"
          class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg text-sm transition-colors">
          Send Email
        </button>
        <button onclick="closeEmailModal()"
          class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition-colors">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/brand/js/nav.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>

version: "3.9"

services:
  assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coastcapital-assistant
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Flask
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      API_KEY: ${API_KEY}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      # MySQL (connects to existing coastcapital-mysql container)
      MYSQL_HOST: ${MYSQL_HOST:-coastcapital-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-dbadmin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-assistant_silver}
      # iCloud Email & Calendar
      ICLOUD_EMAIL: ${ICLOUD_EMAIL}
      ICLOUD_APP_PASSWORD: ${ICLOUD_APP_PASSWORD}
      # Anthropic Claude
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-6}
      # Owner / Family
      OWNER_NAME: ${OWNER_NAME:-Owner}
      KIM_LAKIN_EMAIL: ${KIM_LAKIN_EMAIL:-}
      FAMILY_EMAILS: ${FAMILY_EMAILS:-}
      # Timezone
      TZ: ${TIMEZONE:-America/New_York}
    ports:
      - "5100:5000"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ../CoastCapitalBrand:/app/app/static/brand:ro
    networks:
      - assistant-net
      - db-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  assistant_logs:
    driver: local

networks:
  assistant-net:
    driver: bridge
  # Connect to the existing CoastCapitalDatabase network so we can reach MySQL.
  # Run: docker network ls  to confirm the exact name, then set it below.
  db-external:
    external: true
    name: ${DB_NETWORK_NAME:-coastcapitaldatabase_db-network}
